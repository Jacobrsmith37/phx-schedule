*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#06080f;color:#eee;font-family:'DM Sans',sans-serif}
.app{height:100vh;display:flex;flex-direction:column;padding:6px 10px 4px}

// ── Firebase sync ──────────────────────────────────────────────
var _fbInitialized = false;

function setSyncStatus(state, text) {
  var pill = document.getElementById('syncPill');
  var txt  = document.getElementById('syncTxt');
  if (!pill) return;
  pill.className = 'saving'; // reset
  pill.className = state;
  txt.textContent = text;
}

function persist() {
  // Also keep localStorage as offline fallback
  try { localStorage.setItem('phx_scenarios2', JSON.stringify({scenarios:scenarios,ct:CT})); } catch(e) {}
  if (!window._fbSet) return;
  setSyncStatus('saving', 'SAVING...');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function() {
    try {
      window._fbSet({scenarios: scenarios, ct: CT, savedAt: Date.now()});
      setSyncStatus('saved', 'SAVED');
      setTimeout(function(){ setSyncStatus('', 'SYNCED'); }, 2000);
    } catch(e) {
      setSyncStatus('err', 'SAVE FAILED');
    }
  }, 600); // debounce 600ms so rapid edits don't spam writes
}

function initFirebase() {
  if (_fbInitialized) return;
  _fbInitialized = true;
  setSyncStatus('saving', 'LOADING...');
  window._fbListen(function(data) {
    if (data) {
      scenarios = data.scenarios || {};
      CT = data.ct || CT;
      loadCTInputs();
      // Reload current scenario from fresh data
      if (activeScenario !== "BASE CASE" && scenarios[activeScenario]) {
        R = JSON.parse(scenarios[activeScenario]);
      } else if (activeScenario === "BASE CASE") {
        R = JSON.parse(JSON.stringify(BASE));
      }
      build();
      setSyncStatus('saved', 'SYNCED');
      setTimeout(function(){ setSyncStatus('', 'SYNCED'); }, 1500);
    } else {
      // Nothing in Firebase yet — push current state up
      persist();
      setSyncStatus('saved', 'SYNCED');
    }
  });
}

if (window._fbReady) initFirebase();

// localStorage fallback for initial load before Firebase responds
try{var saved=localStorage.getItem('phx_scenarios2');if(saved){var sd=JSON.parse(saved);scenarios=sd.scenarios||{};CT=sd.ct||CT;}}catch(e){}
// ─────────────────────────────────────────────────────────────

function loadCTInputs(){document.getElementById('ct2').value=CT.m2;document.getElementById('ct3').value=CT.m3;document.getElementById('ct4').value=CT.m4;document.getElementById('ctsb').value=CT.sb;document.getElementById('ctmv').value=CT.mv;}
function updateCT(){CT.m2=+document.getElementById('ct2').value;CT.m3=+document.getElementById('ct3').value;CT.m4=+document.getElementById('ct4').value;CT.sb=+document.getElementById('ctsb').value;CT.mv=+document.getElementById('ctmv').value;persist();build();}

function padDur(p){
  if(p.dov&&p.d)return p.d;
  var wc=p.wc||{m2:0,m3:0,m4:0,sb:0};
  return(wc.m2||0)*CT.m2+(wc.m3||0)*CT.m3+(wc.m4||0)*CT.m4+(wc.sb||0)*CT.sb;
}
function padWells(p){var wc=p.wc||{};return(wc.m2||0)+(wc.m3||0)+(wc.m4||0)+(wc.sb||0);}

function aD(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function dO(d){return Math.round((d-OR)/864e5);}
function pD(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function fm(d){return(d.getMonth()+1)+"/"+d.getDate();}
function fF(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

function recalc(){R.forEach(function(rig){var cur=null;rig.pads.forEach(function(p,i){
  p.dd=padDur(p);p.w=padWells(p);
  if(p.fs){p.start=pD(p.fs);}else if(cur){p.start=aD(cur,CT.mv);}else{p.start=TD;}
  p.end=aD(p.start,p.dd);cur=p.end;});});}

function getMonths(){var ms=[];for(var m=0;m<24;m++){var d=new Date(2025,10+m,1);if(d>new Date(2027,8,1))break;
  ms.push({date:d,days:new Date(d.getFullYear(),d.getMonth()+1,0).getDate(),label:d.toLocaleString('default',{month:'short'})+" '"+String(d.getFullYear()).slice(2)});}return ms;}

function handleDrop(evt){
  var fr=parseInt(evt.from.getAttribute('data-rig')),tr=parseInt(evt.to.getAttribute('data-rig'));
  var pad=R[fr].pads.splice(evt.oldIndex,1)[0];delete pad.fs;
  R[tr].pads.splice(evt.newIndex,0,pad);
  if(activeScenario!=="BASE CASE"){scenarios[activeScenario]=JSON.stringify(R);persist();}build();}

function calcDims(){var vh=window.innerHeight,vw=window.innerWidth;
  var tp=R.reduce(function(s,r){return s+r.pads.length;},0);
  var rh=Math.max(16,Math.min(24,Math.floor((vh-110-R.length*22)/tp)));
  var months=getMonths();var td=months.reduce(function(s,m){return s+m.days;},0);
  LW=Math.min(200,Math.max(140,Math.floor(vw*0.11)));
  DW=Math.max(0.6,(vw-LW-28)/td);
  document.documentElement.style.setProperty('--rh',rh+'px');
  document.documentElement.style.setProperty('--lw',LW+'px');
  return{months:months,gW:td*DW};}

function renderScenarioBar(){var h='<span class="scen-label">SCENARIOS:</span>';
  h+='<div class="scen-tab'+(activeScenario==="BASE CASE"?' active':'')+'" onclick="loadScenario(\'BASE CASE\')">BASE CASE</div>';
  Object.keys(scenarios).forEach(function(nm){var e=nm.replace(/'/g,"\\'");
    h+='<div class="scen-tab'+(activeScenario===nm?' active':'')+'" onclick="loadScenario(\''+e+'\')">'+nm+'<span class="x" onclick="event.stopPropagation();deleteScenario(\''+e+'\')">&times;</span></div>';});
  document.getElementById("scenBar").innerHTML=h;}
function loadScenario(nm){if(nm==="BASE CASE"){R=JSON.parse(JSON.stringify(BASE));}else if(scenarios[nm]){R=JSON.parse(scenarios[nm]);}activeScenario=nm;build();}
function saveScenario(){document.getElementById("sov").classList.add("show");document.getElementById("scenName").value="";document.getElementById("scenName").focus();}
function closeSave(){document.getElementById("sov").classList.remove("show");}
function confirmSave(){var nm=document.getElementById("scenName").value.trim();if(!nm||nm==="BASE CASE")return;scenarios[nm]=JSON.stringify(R);persist();activeScenario=nm;closeSave();build();}
function deleteScenario(nm){delete scenarios[nm];persist();if(activeScenario===nm){activeScenario="BASE CASE";R=JSON.parse(JSON.stringify(BASE));}build();}

// ===== EDIT PAD =====
function calcDur(){
  var ov=document.getElementById('durOv').checked;
  document.getElementById('durMan').style.display=ov?'block':'none';
  var w2=+document.getElementById('wc2').value||0,w3=+document.getElementById('wc3').value||0,w4=+document.getElementById('wc4').value||0,wsb=+document.getElementById('wcsb').value||0;
  document.getElementById('wc2c').textContent=w2?w2+'×'+CT.m2+'='+(w2*CT.m2)+'d':'';
  document.getElementById('wc3c').textContent=w3?w3+'×'+CT.m3+'='+(w3*CT.m3)+'d':'';
  document.getElementById('wc4c').textContent=w4?w4+'×'+CT.m4+'='+(w4*CT.m4)+'d':'';
  document.getElementById('wcsbc').textContent=wsb?wsb+'×'+CT.sb+'='+(wsb*CT.sb)+'d':'';
  var calc=w2*CT.m2+w3*CT.m3+w4*CT.m4+wsb*CT.sb;
  var final=ov?(+document.getElementById('durMan').value||calc):calc;
  document.getElementById('durCalc').textContent=final+'d'+(ov?' (override)':'');
  document.getElementById('durCalc').style.color=ov?'#FBBF24':'#4ADE80';
}
function openEdit(ri,pi){editRi=ri;editPi=pi;var p=R[ri].pads[pi];
  document.getElementById("editTitle").textContent="Edit: "+p.n;
  document.getElementById("editName").value=p.n;
  document.getElementById("editArea").value=p.a;
  document.getElementById("editStart").value=p.fs||"";
  var wc=p.wc||{m2:0,m3:0,m4:0,sb:0};
  document.getElementById("wc2").value=wc.m2||0;document.getElementById("wc3").value=wc.m3||0;
  document.getElementById("wc4").value=wc.m4||0;document.getElementById("wcsb").value=wc.sb||0;
  document.getElementById("durOv").checked=!!p.dov;
  document.getElementById("durMan").value=p.d||padDur(p);
  calcDur();
  document.getElementById("eov").classList.add("show");document.getElementById("editName").focus();}
function closeEdit(){document.getElementById("eov").classList.remove("show");}
function saveEdit(){if(editRi===null)return;var p=R[editRi].pads[editPi];
  var nn=document.getElementById("editName").value.trim();if(nn)p.n=nn;
  p.a=document.getElementById("editArea").value;
  var ns=document.getElementById("editStart").value;if(ns){p.fs=ns;}else{delete p.fs;}
  p.wc={m2:+document.getElementById("wc2").value||0,m3:+document.getElementById("wc3").value||0,m4:+document.getElementById("wc4").value||0,sb:+document.getElementById("wcsb").value||0};
  p.w=padWells(p);
  if(document.getElementById("durOv").checked){p.dov=true;p.d=+document.getElementById("durMan").value||50;}else{delete p.dov;delete p.d;}
  if(activeScenario!=="BASE CASE"){scenarios[activeScenario]=JSON.stringify(R);persist();}
  closeEdit();build();}
function deletePad(){if(editRi===null)return;R[editRi].pads.splice(editPi,1);
  if(activeScenario!=="BASE CASE"){scenarios[activeScenario]=JSON.stringify(R);persist();}closeEdit();build();}

// ===== ADD PAD =====
function calcAddDur(){var w2=+document.getElementById('awc2').value||0,w3=+document.getElementById('awc3').value||0,w4=+document.getElementById('awc4').value||0,wsb=+document.getElementById('awcsb').value||0;
  document.getElementById('addDurCalc').textContent=(w2*CT.m2+w3*CT.m3+w4*CT.m4+wsb*CT.sb)+'d';}
function openAdd(ri){addRig=ri;document.getElementById("addTitle").textContent="Add Pad to "+R[ri].name;
  document.getElementById("addName").value="";document.getElementById("awc2").value=0;document.getElementById("awc3").value=4;document.getElementById("awc4").value=0;document.getElementById("awcsb").value=0;document.getElementById("addStart").value="";calcAddDur();
  document.getElementById("aov").classList.add("show");document.getElementById("addName").focus();}
function closeAdd(){document.getElementById("aov").classList.remove("show");}
function confirmAdd(){var nn=document.getElementById("addName").value.trim();if(!nn)return;
  var wc={m2:+document.getElementById("awc2").value||0,m3:+document.getElementById("awc3").value||0,m4:+document.getElementById("awc4").value||0,sb:+document.getElementById("awcsb").value||0};
  var pad={n:nn,a:document.getElementById("addArea").value,wc:wc,w:wc.m2+wc.m3+wc.m4+wc.sb};
  var ns=document.getElementById("addStart").value;if(ns)pad.fs=ns;
  R[addRig].pads.push(pad);
  if(activeScenario!=="BASE CASE"){scenarios[activeScenario]=JSON.stringify(R);persist();}closeAdd();build();}

function build(){
  recalc();sortables.forEach(function(s){s.destroy();});sortables=[];
  renderScenarioBar();
  var dims=calcDims();var months=dims.months;var gW=dims.gW;var tOff=dO(TD);

  var usedA={};R.forEach(function(r){r.pads.forEach(function(p){usedA[p.a]=1;});});
  document.getElementById("legend").innerHTML=Object.keys(usedA).sort().map(function(a){return'<div class="leg"><div class="dot" style="background:'+(AC[a]||'#666')+'"></div>'+a+'</div>';}).join('');

  var mh='';months.forEach(function(m){var w=m.days*DW;var cur=m.date.getMonth()===TD.getMonth()&&m.date.getFullYear()===TD.getFullYear();
    mh+='<div class="mo'+(cur?' cur':'')+'" style="width:'+w+'px">'+m.label+'</div>';});
  document.getElementById("monthsRow").innerHTML=mh;document.getElementById("monthsRow").style.marginLeft=LW+'px';

  var h='';
  R.forEach(function(rig,ri){
    var tD=rig.pads.reduce(function(s,p){return s+p.dd;},0);
    var tW=rig.pads.reduce(function(s,p){return s+p.w;},0);
    h+='<div class="rig-section"><div class="rig-hdr">'+rig.name+'<span class="cnt">'+rig.pads.length+'p &middot; '+tW+'w &middot; '+tD+'d <span class="add-btn" onclick="openAdd('+ri+')">[+ADD]</span></span></div>';
    h+='<div class="rig-body" data-rig="'+ri+'">';
    rig.pads.forEach(function(p,pi){
      var so=dO(p.start),bw=p.dd*DW,bl=so*DW;
      var isPast=p.end<TD,isNow=p.start<=TD&&p.end>=TD;
      var col=AC[p.a]||'#666';
      h+='<div class="pad-row"><div class="pad-lbl">';
      h+='<span class="nm" style="color:'+col+'" onclick="event.stopPropagation();openEdit('+ri+','+pi+')">'+p.n+'</span>';
      h+='<span class="at" style="background:'+col+'22;color:'+col+'">'+p.a+'</span>';
      h+='<span class="dy" onclick="event.stopPropagation();openEdit('+ri+','+pi+')">'+p.dd+'d</span>';
      h+='</div><div class="gantt-area" style="width:'+gW+'px">';
      h+='<div class="bar'+(isPast?' past':'')+(isNow?' now':'')+'" style="left:'+bl+'px;width:'+Math.max(bw,12)+'px;background:'+col+';opacity:'+(isPast?'0.25':isNow?'0.85':'0.55')+'">';
      if(bw>55)h+=fm(p.start)+'–'+fm(p.end);else if(bw>25)h+=fm(p.start);
      h+='</div>';
      if(pi===0){h+='<div class="tl" style="left:'+(tOff*DW)+'px"></div>';}
      h+='</div></div>';});
    h+='</div></div>';});
  document.getElementById("rigsArea").innerHTML=h;

  var tp=0,td=0,tw=0,fp=0;var last=new Date(2025,0,1);
  R.forEach(function(r){tp+=r.pads.length;r.pads.forEach(function(p){td+=p.dd;tw+=p.w;if(p.start>TD)fp++;});
    var l=r.pads[r.pads.length-1];if(l&&l.end>last)last=l.end;});
  document.getElementById("stats").innerHTML=[
    {v:tp,l:"PADS"},{v:tw,l:"WELLS"},{v:td+"d",l:"DRILL DAYS"},{v:R.length,l:"RIGS"},{v:fp,l:"FUTURE"},
    {v:fm(last)+"/"+last.getFullYear(),l:"END DATE",c:"#C8102E"},
    {v:activeScenario,l:"SCENARIO",c:activeScenario==="BASE CASE"?"#9CA3AF":"#3B82F6"}
  ].map(function(s){return'<div class="stat"><div class="v" style="color:'+(s.c||"#F0F0F0")+';font-size:'+(s.l==="SCENARIO"?"9px":"12px")+'">'+s.v+'</div><div class="l">'+s.l+'</div></div>';}).join('');

  var bodies=document.querySelectorAll('.rig-body');
  for(var i=0;i<bodies.length;i++){(function(el){sortables.push(new Sortable(el,{
    group:'rigs',animation:150,forceFallback:true,fallbackClass:'sortable-drag',ghostClass:'sortable-ghost',chosenClass:'sortable-chosen',onEnd:handleDrop}));})(bodies[i]);}
}

function doExport(){recalc();var c="Scenario,Rig,Pad,Area,Wells,2mi,3mi,4mi,SB,Days,Start,End,Override\n";
R.forEach(function(r){r.pads.forEach(function(p){var wc=p.wc||{};
  c+='"'+activeScenario+'","'+r.name+'","'+p.n+'","'+p.a+'",'+p.w+','+(wc.m2||0)+','+(wc.m3||0)+','+(wc.m4||0)+','+(wc.sb||0)+','+p.dd+','+fF(p.start)+','+fF(p.end)+','+(p.dov?'Y':'N')+"\n";});});
var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/csv'}));a.download='phx_'+activeScenario.replace(/\s+/g,'_')+'_'+fF(new Date())+'.csv';a.click();}

['editName','editStart','durMan','scenName','addName'].forEach(function(id){
  document.getElementById(id).addEventListener("keydown",function(e){
    if(e.key==="Escape"){closeEdit();closeSave();closeAdd();}});});
window.addEventListener("resize",function(){build();});
populateAreaSelects();loadCTInputs();build();
</script></body></html>
